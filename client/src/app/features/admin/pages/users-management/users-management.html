<app-sidebar></app-sidebar>

<main class="min-h-screen bg-gray-50 lg:ml-64 transition-all duration-300">
  <app-admin-header></app-admin-header>

  <div class="p-6 max-w-7xl mx-auto">
    <!-- Header Section -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">Users Management</h1>
        <p class="text-gray-500 mt-1">Manage and monitor all users in your platform</p>
      </div>
      <button
        (click)="openModal()"
        class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition"
      >
        ➕ Add New User
      </button>
    </div>

    <!-- Users Table -->
    <app-data-table
      title="All Users"
      [columns]="['ID', 'Name', 'Email', 'Role', 'Status', 'Phone', 'Joindate']"
      [data]="users"
    >
    </app-data-table>
  </div>

  <!-- Modal -->
  <div
    *ngIf="showModal()"
    class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
  >
    <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
      <h2 class="text-2xl font-bold text-gray-900 mb-6">
        {{ isEditing() ? 'Edit User' : 'Add New User' }}
      </h2>

      <form (ngSubmit)="submitForm()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
          <input
            type="text"
            [(ngModel)]="formData().name"
            name="name"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input
            type="email"
            [(ngModel)]="formData().email"
            name="email"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
          <input
            type="tel"
            [(ngModel)]="formData().phone"
            name="phone"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
          <select
            [(ngModel)]="formData().role"
            name="role"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
            <option value="customer">Customer</option>
            <option value="seller">Seller</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
          <select
            [(ngModel)]="formData().status"
            name="status"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
            <option value="active">Active</option>
            <option value="restricted">Restricted</option>
            <option value="banned">Banned</option>
          </select>
        </div>

        <div class="flex gap-3 pt-4">
          <button
            type="button"
            (click)="closeModal()"
            class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition font-medium"
          >
            Cancel
          </button>
          <button
            type="submit"
            class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium"
          >
            {{ isEditing() ? 'Update' : 'Add' }} User
          </button>
        </div>
      </form>
    </div>
  </div>
</main>
