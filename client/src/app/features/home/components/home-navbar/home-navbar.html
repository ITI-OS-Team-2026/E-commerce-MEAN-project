    </div>

    <div class="flex items-center gap-2 sm:gap-4">
      <ng-container *ngIf="!isLoggedIn; else authenticatedMenu">
        <app-button label="Sign Up" variant="outlined" route="/auth/register" size="md"
          class="hidden sm:inline-block"></app-button>
        <app-button label="Sign In" variant="primary" route="/auth/login" size="md"></app-button>
      </ng-container>

      <ng-template #authenticatedMenu>
        <span class="hidden sm:inline text-sm text-on-surface-variant">Hello, {{ user?.name || 'User' }}</span>
        <app-button label="Dashboard" variant="outlined" [route]="profileRoute" size="md"
          class="hidden sm:inline-block"></app-button>
        <button type="button"
          class="inline-flex items-center justify-center rounded-md font-label font-semibold transition-all duration-200 active:scale-95 px-3 sm:px-5 py-2 sm:py-2.5 text-xs sm:text-sm bg-red-600 text-white border border-red-700 hover:bg-red-700 whitespace-nowrap"
          (click)="logout()">
          Logout
        </button>
      </ng-template>
    </div>
  </div>
