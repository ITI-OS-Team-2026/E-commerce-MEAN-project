<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Azure Meridian | Add/Edit Product</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary": "#ffffff",
                        "surface-container-high": "#e6e8ea",
                        "on-surface": "#191c1e",
                        "error-container": "#ffdad6",
                        "on-surface-variant": "#424654",
                        "inverse-surface": "#2d3133",
                        "error": "#ba1a1a",
                        "secondary": "#515f74",
                        "tertiary-container": "#a93802",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed-variant": "#3a485b",
                        "surface-container": "#eceef0",
                        "primary-container": "#2559bd",
                        "on-tertiary-fixed-variant": "#812800",
                        "tertiary-fixed-dim": "#ffb59b",
                        "outline": "#737785",
                        "surface-container-highest": "#e0e3e5",
                        "secondary-container": "#d5e3fc",
                        "on-tertiary-container": "#ffcebd",
                        "primary": "#00419e",
                        "on-secondary-container": "#57657a",
                        "primary-fixed": "#dae2ff",
                        "primary-fixed-dim": "#b1c5ff",
                        "on-primary-fixed": "#001946",
                        "on-background": "#191c1e",
                        "surface-dim": "#d8dadc",
                        "surface-variant": "#e0e3e5",
                        "inverse-primary": "#b1c5ff",
                        "surface": "#f7f9fb",
                        "secondary-fixed": "#d5e3fc",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "tertiary-fixed": "#ffdbcf",
                        "tertiary": "#822800",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "background": "#f7f9fb",
                        "on-secondary-fixed": "#0d1c2e",
                        "on-tertiary-fixed": "#380d00",
                        "surface-tint": "#2559bd",
                        "surface-bright": "#f7f9fb",
                        "outline-variant": "#c3c6d6",
                        "on-primary-container": "#ccd8ff",
                        "on-primary-fixed-variant": "#00419e",
                        "surface-container-low": "#f2f4f6",
                        "secondary-fixed-dim": "#b9c7df"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        .glass-nav {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .ghost-border {
            border-bottom: 2px solid rgba(195, 198, 214, 0.2);
        }

        .ghost-border:focus-within {
            border-bottom-color: #00419e;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            box-shadow: none;
        }
    </style>
</head>

<body class="bg-surface font-body text-on-surface antialiased">
    <!-- Sidebar Navigation -->
    <aside
        class="h-screen w-64 fixed left-0 top-0 overflow-y-auto bg-slate-50 flex flex-col gap-2 p-4 border-r border-slate-200/20 dark:border-slate-800/20 z-50">
        <div class="mb-8 px-2">
            <app-logo></app-logo>
        </div>
        <nav class="flex-1 space-y-1">
            <a class="flex items-center gap-3 px-3 py-2 text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-300 transition-all duration-300 rounded-lg"
                href="#">
                <span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
                <span class="font-inter text-sm font-medium">Dashboard</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2 bg-white dark:bg-slate-900 text-blue-700 dark:text-blue-400 shadow-sm rounded-lg transition-all duration-300"
                href="#">
                <span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
                <span class="font-inter text-sm font-medium">Inventory</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2 text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-300 transition-all duration-300 rounded-lg"
                routerLink="/cart">
                <span class="material-symbols-outlined" data-icon="shopping_cart">shopping_cart</span>
                <span class="font-inter text-sm font-medium">Cart</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2 text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-300 transition-all duration-300 rounded-lg"
                href="#">
                <span class="material-symbols-outlined" data-icon="group">group</span>
                <span class="font-inter text-sm font-medium">Users</span>
            </a>
        </nav>
        <div class="mt-auto pt-4 border-t border-slate-200/20">
            <a class="flex items-center gap-3 px-3 py-2 text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-300 transition-all duration-300 rounded-lg"
                href="#">
                <span class="material-symbols-outlined" data-icon="logout">logout</span>
                <span class="font-inter text-sm font-medium">Logout</span>
            </a>
        </div>
    </aside>
    <!-- Main Content Area -->
    <main class="ml-64 min-h-screen">
        <!-- Top Navigation -->
        <header
            class="w-full sticky top-0 z-40 bg-white/80 backdrop-blur-xl shadow-sm dark:shadow-none flex justify-between items-center px-8 py-4">
            <div class="flex items-center gap-4">
                <span class="text-xl font-bold tracking-tight text-blue-900 font-headline">Add
                    New Product</span>
                
            </div>
            <div class="flex items-center gap-4">
                <div class="w-8 h-8 rounded-full bg-slate-200 overflow-hidden cursor-pointer" routerLink="/auth/profile">
                    <img alt="User profile" data-alt="Close up of professional man's face"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuAYfetKMe_haJuBlWU-iOjp7RbRF9M2rGcBSWHajjE_aiWeW2WkoLfoIxY-bRXsySqX0h7hvXQ9lE6bOhiarilm98Ky_Ttz9z-gdeAlrFK3qniwtbGRRlVqa6tLe7jgt2ZTyhBymnN59tSD9SRW7d8dqV5LqdLUaNZ6zjoJwQKoHRH4LjIxzeym19txI8V14RMlYBEAmYefPr7SulxtVqN3SNHysIJqkLP73ep741hWrxdK92g-ugomiEptXBQ_ywZTibrKF66oHagz" />
                </div>
            </div>
        </header>
        <div class="p-8 max-w-6xl mx-auto">
            <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <!-- Left Column: Form Fields -->
                <div class="lg:col-span-8 space-y-10">
                    <!-- Section: Basic Information -->
                    <section class="space-y-6">
                        <div class="flex items-center gap-2 mb-2">
                            <h2 class="text-xl font-bold font-headline tracking-tight">Basic
                                Information</h2>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="md:col-span-2">
                                <label
                                    class="block text-xs font-bold uppercase tracking-wider text-outline mb-1">Product
                                    Name</label>
                                <div class="ghost-border bg-surface-container-highest/30 px-4 py-3">
                                    <input formControlName="name"
                                        class="w-full bg-transparent border-none p-0 text-base font-medium"
                                        placeholder="e.g., Titanium Architectural Pivot Door Handle" type="text" />
                                </div>
                            </div>
                            <div>
                                <label
                                    class="block text-xs font-bold uppercase tracking-wider text-outline mb-1">Category</label>
                                <div class="ghost-border bg-surface-container-highest/30 px-4 py-3">
                                    <select formControlName="category"
                                        class="w-full bg-transparent border-none p-0 text-base font-medium appearance-none">
                                        <option value="">Select Category</option>
                                        <option *ngFor="let cat of categories" [value]="cat._id">{{ cat.name }}</option>
                                    </select>
                                </div>
                            </div>
                            <div class="md:col-span-2">
                                <label
                                    class="block text-xs font-bold uppercase tracking-wider text-outline mb-1">Description</label>
                                <div class="ghost-border bg-surface-container-highest/30 px-4 py-3">
                                    <textarea formControlName="description"
                                        class="w-full bg-transparent border-none p-0 text-base font-medium resize-none"
                                        placeholder="Describe the aesthetic and functional properties..."
                                        rows="4"></textarea>
                                </div>
                            </div>
                        </div>
                    </section>
                    <!-- Section: Pricing & Inventory -->
                    <section class="space-y-6">
                        <h2 class="text-xl font-bold font-headline tracking-tight">Pricing
                            &amp; Inventory</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="bg-surface-container-low p-6 rounded-lg">
                                <label class="block text-xs font-bold uppercase tracking-wider text-outline mb-2">Retail
                                    Price</label>
                                <div class="flex items-center">
                                    <span class="text-outline font-bold mr-2">$</span>
                                    <input formControlName="price"
                                        class="w-full bg-transparent border-none p-0 text-2xl font-bold font-headline tracking-tight"
                                        placeholder="0.00" type="number" />
                                </div>
                            </div>

                            <div class="bg-surface-container-low p-6 rounded-lg">
                                <label class="block text-xs font-bold uppercase tracking-wider text-outline mb-2">Stock
                                    Quantity</label>
                                <div class="flex items-center">
                                    <input formControlName="stock"
                                        class="w-full bg-transparent border-none p-0 text-2xl font-bold font-headline tracking-tight"
                                        placeholder="0" type="number" />
                                    <span class="material-symbols-outlined text-outline"
                                        data-icon="inventory">inventory</span>
                                </div>
                            </div>
                        </div>
                    </section>

                </div>
                <!-- Right Column: Media & Actions -->
                <div class="lg:col-span-4 space-y-8">
                    <!-- Media Upload Section -->
                    <div class="space-y-4">
                        <h2 class="text-lg font-bold font-headline tracking-tight">Product
                            Assets</h2>
                        <div class="space-y-4">
                            <div class="flex gap-2">
                                <input #imgUrl type="text" placeholder="Paste image URL here..."
                                    class="flex-1 bg-surface-container-highest/30 px-4 py-2 rounded ghost-border border-none text-sm"
                                    (keyup.enter)="addImage(imgUrl.value); imgUrl.value=''" />
                                <button type="button" (click)="addImage(imgUrl.value); imgUrl.value=''"
                                    class="px-4 py-2 bg-primary text-white text-xs font-bold rounded hover:brightness-110 transition-all">
                                    Add
                                </button>
                            </div>
                            <p class="text-[10px] text-outline italic leading-tight">
                                * Images must be valid URLs (starting with http/https)
                            </p>
                        </div>

                        <div class="grid grid-cols-3 gap-2">
                            <div *ngFor="let control of imagesFormArray.controls; let i = index"
                                class="aspect-square rounded-lg bg-surface-container-high overflow-hidden group relative">
                                <img [src]="control.value" class="w-full h-full object-cover"
                                    onerror="this.src='https://placehold.co/400x400?text=Invalid+Image'" />
                                <div
                                    class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                    <span (click)="removeImage(i)"
                                        class="material-symbols-outlined text-white cursor-pointer"
                                        data-icon="delete">delete</span>
                                </div>
                            </div>
                            <!-- Empty states placeholders or drop zone could stay if needed, but the user asked for a way to store/send -->
                            <div *ngIf="imagesFormArray.length === 0"
                                class="aspect-square rounded-lg bg-surface-container-high flex items-center justify-center border border-dashed border-outline-variant">
                                <span class="material-symbols-outlined text-outline"
                                    data-icon="add">add_photo_alternate</span>
                            </div>
                        </div>
                    </div>
                    <!-- Actions Card -->
                    <div class="bg-surface-container-lowest p-8 rounded-xl shadow-sm space-y-4 sticky top-24">
                        <button (click)="onSubmit()" [disabled]="isSubmitting"
                            class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-lg shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all disabled:opacity-50"
                            type="button">
                            {{ isSubmitting ? 'Saving...' : 'Save Product' }}
                        </button>
                        <button
                            class="w-full py-3 bg-surface-container-high text-on-surface font-bold rounded-lg hover:bg-surface-container-highest active:scale-[0.98] transition-all"
                            type="button">
                            Cancel
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
