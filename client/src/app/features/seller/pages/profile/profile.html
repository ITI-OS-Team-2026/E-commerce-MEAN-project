<div class="bg-surface text-on-surface min-h-screen">
  <app-sidebar></app-sidebar>
  <main class="transition-all duration-300 min-h-screen lg:ml-64 p-8 pt-20 lg:pt-8">
    <div class="max-w-xl mx-auto bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
      
      <div class="bg-blue-600 p-6 text-center">
        <div class="w-24 h-24 bg-white text-blue-600 rounded-full flex items-center justify-center text-4xl font-bold mx-auto mb-4 shadow-lg">
          {{ sellerUser()?.name?.charAt(0) || 'S' }}
        </div>
        <h1 class="text-2xl font-bold text-white">{{ sellerUser()?.name }}</h1>
        <p class="text-blue-100 uppercase text-sm mt-1 tracking-wider">{{ sellerUser()?.role }} Profile</p>
      </div>

      <div class="p-6">
        <div class="space-y-4 mb-8">
          <div class="flex flex-col">
            <span class="text-xs text-gray-500 uppercase font-bold">Email</span>
            <span class="text-lg text-gray-900 font-medium">{{ sellerUser()?.email }}</span>
          </div>
          <div class="flex flex-col">
            <span class="text-xs text-gray-500 uppercase font-bold">Account Status</span>
            <span class="text-lg text-gray-900 font-medium text-green-600 flex items-center gap-2">
              <span class="material-symbols-outlined text-sm">verified</span>
              Active Seller
            </span>
          </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 pt-4 border-t border-gray-100">
          <button routerLink="/seller/dashboard" class="flex-1 px-4 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold transition-colors flex items-center justify-center gap-2 shadow text-sm">
            <span class="material-symbols-outlined text-base">dashboard</span>
            Back to Dashboard
          </button>
          
          <button routerLink="/" class="flex-1 px-4 py-3 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-lg font-bold transition-colors flex items-center justify-center gap-2 text-sm shadow-sm border border-gray-200">
            <span class="material-symbols-outlined text-base">home</span>
            Go to Home Page
          </button>
        </div>
      </div>

    </div>
  </main>
</div>
