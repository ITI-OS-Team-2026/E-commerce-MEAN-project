@if (route) {
  <a
    [routerLink]="disabled ? null : route"
    [attr.aria-disabled]="disabled"
    [class]="variantClasses + (disabled ? ' pointer-events-none opacity-50' : '')"
  >
    {{ label }}
  </a>
} @else {
  <button [type]="type" [disabled]="disabled" [class]="variantClasses">
    {{ label }}
  </button>
}
