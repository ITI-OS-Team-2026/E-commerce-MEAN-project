<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Order Status Update</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        background: #28a745;
        color: white;
        padding: 20px;
        text-align: center;
        border-radius: 8px 8px 0 0;
      }
      .content {
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 0 0 8px 8px;
      }
      .status {
        font-size: 18px;
        font-weight: bold;
        color: #28a745;
      }
      .footer {
        text-align: center;
        margin-top: 20px;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Order Status Update</h1>
    </div>

    <div class="content">
      <p>Dear {{userName}},</p>

      <p>Your order status has been updated.</p>

      <p><strong>Order ID:</strong> #{{orderId}}</p>
      <p><strong>New Status:</strong> <span class="status">{{status}}</span></p>

      <p>You can track your order anytime from your account.</p>
    </div>

    <div class="footer">
      <p>This is an automated message. Please do not reply.</p>
    </div>
  </body>
</html>
