<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
      }
      .container {
        background: #fff;
        padding: 30px;
        border-radius: 8px;
        max-width: 500px;
        margin: auto;
      }
      .btn {
        display: inline-block;
        padding: 12px 24px;
        background: #4f46e5;
        color: #fff;
        text-decoration: none;
        border-radius: 6px;
        margin-top: 20px;
      }
      .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #999;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Hello {{name}},</h2>
      <p>Thanks for registering! Please verify your email address to activate your account.</p>
      <a href="{{verificationUrl}}" class="btn">Verify Email</a>
      <p class="footer">If you did not create an account, please ignore this email.</p>
    </div>
  </body>
</html>
